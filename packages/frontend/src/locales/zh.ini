constraints.operatorExample.semver_in=例：version 在 ["1.0.0","2.0.0"] 中 → 2.0.0 ✓
constraints.operatorExample.semver_lt=例：version < "2.0.0" → 1.9.9 ✓, 2.0.0 ✗
constraints.operatorExample.semver_lte=例：version <= "2.0.0" → 2.0.0 ✓, 2.0.1 ✗
constraints.operatorExample.str_contains=例：email 包含 "gmail" → "test@gmail.com" ✓
constraints.operatorExample.str_ends_with=例：email 以 ".com" 结尾 → "a@test.com" ✓
constraints.operatorExample.str_eq=例：userId = "user123" → "user123" 匹配 ✓
constraints.operatorExample.str_in=例：region 在 ["US","KR","JP"] 中 → "KR" ✓
constraints.operatorExample.str_regex=例：email 匹配 "^[a-z]+@" → "test@a.com" ✓
constraints.operatorExample.str_starts_with=例：country 以 "K" 开头 → "Korea" ✓
