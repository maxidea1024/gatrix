[package]
name = "gatrix-edge-rust"
version = "0.1.0"
edition = "2021"
description = "Gatrix Edge Server - High-availability caching proxy built with Rust"
license = "MIT"

[dependencies]
gatrix-rust-server-sdk = { path = "../sdks/server-sdks/gatrix-rust-server-sdk" }

# Web framework
actix-web = "4"
actix-cors = "0.7"
actix-rt = "2"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Logging
log = "0.4"
env_logger = "0.11"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Regex for token parsing
regex = "1"

# Redis for PubSub
redis = { version = "0.27", features = ["tokio-comp", "aio"] }

# Environment variables
dotenvy = "0.15"

# CLI argument parsing
clap = { version = "4", features = ["derive", "env"] }

# Stream utilities (for Redis PubSub)
futures-util = "0.3"
