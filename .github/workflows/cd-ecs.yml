name: CD - ECS Deploy

# ============================================
# Trigger Conditions
# ============================================
on:
  # Auto-deploy on merge to specific branch
  push:
    branches:
      - release_ecs          # Change this to your deployment branch
    # Uncomment to also trigger on tags:
    # tags: ['v*']

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to deploy (default: git SHA)'
        required: false
        default: ''
      services:
        description: 'Services to deploy (comma-separated, or "all")'
        required: false
        default: 'all'
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

# ============================================
# Environment Variables
# ============================================
env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'ap-northeast-2' }}.amazonaws.com
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME || 'gatrix-cluster' }}

# ============================================
# Jobs
# ============================================
jobs:
  # ----------------------------------------
  # Build and Push Docker Images to ECR
  # ----------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # For OIDC authentication (if configured)

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      backend-image: ${{ steps.meta.outputs.backend-image }}
      frontend-image: ${{ steps.meta.outputs.frontend-image }}
      edge-image: ${{ steps.meta.outputs.edge-image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: |
          yarn test:backend || true
          yarn test:frontend || true

      - name: Determine image tag
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            TAG="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          TAG_SHORT="${TAG:0:12}"
          echo "tag=$TAG_SHORT" >> $GITHUB_OUTPUT
          echo "backend-image=${{ env.ECR_REGISTRY }}/gatrix-backend:$TAG_SHORT" >> $GITHUB_OUTPUT
          echo "frontend-image=${{ env.ECR_REGISTRY }}/gatrix-frontend:$TAG_SHORT" >> $GITHUB_OUTPUT
          echo "edge-image=${{ env.ECR_REGISTRY }}/gatrix-edge:$TAG_SHORT" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG_SHORT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in gatrix-backend gatrix-frontend gatrix-edge; do
            aws ecr describe-repositories --repository-names "$repo" --region "${{ env.AWS_REGION }}" 2>/dev/null || \
            aws ecr create-repository --repository-name "$repo" --region "${{ env.AWS_REGION }}" \
              --image-scanning-configuration scanOnPush=true
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: contains(github.event.inputs.services || 'all', 'backend') || contains(github.event.inputs.services || 'all', 'all')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend-image }}
            ${{ env.ECR_REGISTRY }}/gatrix-backend:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        if: contains(github.event.inputs.services || 'all', 'frontend') || contains(github.event.inputs.services || 'all', 'all')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend-image }}
            ${{ env.ECR_REGISTRY }}/gatrix-frontend:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push edge
        if: contains(github.event.inputs.services || 'all', 'edge') || contains(github.event.inputs.services || 'all', 'all')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/edge/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.edge-image }}
            ${{ env.ECR_REGISTRY }}/gatrix-edge:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge

  # ----------------------------------------
  # Deploy to ECS
  # ----------------------------------------
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Backend ---
      - name: Download current backend task definition
        if: contains(github.event.inputs.services || 'all', 'backend') || contains(github.event.inputs.services || 'all', 'all')
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_BACKEND_SERVICE || 'gatrix-backend' }} \
            --query taskDefinition \
            --output json > backend-task-def.json

      - name: Update backend task definition with new image
        if: contains(github.event.inputs.services || 'all', 'backend') || contains(github.event.inputs.services || 'all', 'all')
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: backend
          image: ${{ needs.build-and-push.outputs.backend-image }}

      - name: Deploy backend to ECS
        if: contains(github.event.inputs.services || 'all', 'backend') || contains(github.event.inputs.services || 'all', 'all')
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_BACKEND_SERVICE || 'gatrix-backend' }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      # --- Frontend ---
      - name: Download current frontend task definition
        if: contains(github.event.inputs.services || 'all', 'frontend') || contains(github.event.inputs.services || 'all', 'all')
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_FRONTEND_SERVICE || 'gatrix-frontend' }} \
            --query taskDefinition \
            --output json > frontend-task-def.json

      - name: Update frontend task definition with new image
        if: contains(github.event.inputs.services || 'all', 'frontend') || contains(github.event.inputs.services || 'all', 'all')
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: frontend
          image: ${{ needs.build-and-push.outputs.frontend-image }}

      - name: Deploy frontend to ECS
        if: contains(github.event.inputs.services || 'all', 'frontend') || contains(github.event.inputs.services || 'all', 'all')
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_FRONTEND_SERVICE || 'gatrix-frontend' }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      # --- Edge ---
      - name: Download current edge task definition
        if: contains(github.event.inputs.services || 'all', 'edge') || contains(github.event.inputs.services || 'all', 'all')
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_EDGE_SERVICE || 'gatrix-edge' }} \
            --query taskDefinition \
            --output json > edge-task-def.json

      - name: Update edge task definition with new image
        if: contains(github.event.inputs.services || 'all', 'edge') || contains(github.event.inputs.services || 'all', 'all')
        id: edge-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: edge-task-def.json
          container-name: edge
          image: ${{ needs.build-and-push.outputs.edge-image }}

      - name: Deploy edge to ECS
        if: contains(github.event.inputs.services || 'all', 'edge') || contains(github.event.inputs.services || 'all', 'all')
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.edge-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_EDGE_SERVICE || 'gatrix-edge' }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      # --- Summary ---
      - name: Deployment Summary
        if: always()
        run: |
          echo "========================================="
          echo "  Deployment Summary"
          echo "========================================="
          echo "  Tag:     ${{ needs.build-and-push.outputs.image-tag }}"
          echo "  Cluster: ${{ env.ECS_CLUSTER }}"
          echo "  Region:  ${{ env.AWS_REGION }}"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "========================================="
